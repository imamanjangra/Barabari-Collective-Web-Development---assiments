
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photo Gallery</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Photo Gallery</h1>
    </header>

    <main>
        <div class="container">

            <div class="card">
                <img src="images/nature.jfif" alt="nature view">
                <h2>Nature View</h2>
            </div>

            <div class="card">
                <img src="images/bmw.jfif" alt="BMW">
                <h2>BMW</h2>
            </div>

            <div class="card">
                <img src="images/fish.jfif" alt="Fish">

                <h2>Fish</h2>
            </div>

            <div class="card">
                <img src="images/life.jfif" alt="Life">
                <h2>Life</h2>
            </div>

            <div class="card">
                <img src="images/Mountain.jfif" alt="Mountain">

                <h2>Mountain</h2>
            </div>

            <div class="card">
                <img src="images/nature2.jfif" alt="Nature 2">
                <h2>Nature</h2>
            </div>

            <div class="card">
                <img src="images/tree.jfif" alt="Tree">
                <h2>Tree</h2>
            </div>

        </div>
    </main>

    <footer>
        <p> My Photo Gallery</p>
    </footer>

</body>
</html>
