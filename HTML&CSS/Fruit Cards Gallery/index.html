<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Cards Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

        </div>

            <p>Color: Purple</p>
        </div>

            <h2>Strawberry</h2>
            <p>Color: Red</p>
        </div>

</html>
