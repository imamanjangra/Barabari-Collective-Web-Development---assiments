<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Posters</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>My Movie Collection</h1>

    <div class="hero-section">

        <div class="poster-card">
            <img class="poster" src="images/End-game.jfif" alt="Avengers">
            <h2>Avengers: Endgame</h2>
            <p>⭐ 8.4 | Action, Adventure</p>
        </div>

        <div class="poster-card">
            <img class="poster" src="images/Avatar.jfif" alt="Avatar">
            <h2>Avatar</h2>
            <p>⭐ 7.9 | Adventure, Fantasy</p>
        </div>

        <div class="poster-card">
            <img class="poster" src="images/Demon-slayer.jfif" alt="Demon Slayer">
            <h2>Demon Slayer</h2>
            <p>⭐ 8.8 | Action, Fantasy</p>
        </div>

        <div class="poster-card">
            <img class="poster" src="images/One-punch-man.jfif" alt="One Punch Man">
            <h2>One Punch Man</h2>
            <p>⭐ 8.4 | Action, Comedy</p>
        </div>

        <div class="poster-card">
            <img class="poster" src="images/vincenzo.jfif" alt="Vincenzo">
            <h2>Vincenzo</h2>
            <p>⭐ 7.8 | Action, Comedy</p>
        </div>



        <div class="poster-card">
            <img class="poster" src="images/sakamoto.jfif" alt="Sakamoto">
            <h2>Sakamoto</h2>
            <p>⭐ 8.2 | Action, Comedy</p>
        </div>



    </div>

</body>
</html>
