<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mini Bank Simulator</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app-container">
    
      <section id="signup-page" class="section active">
        <div class="card auth-card">
          <h1>Create Account</h1>

          <form id="signup-form">
            <input
              type="text"
              id="signup-name"
              placeholder="Full Name"
              required
            />

            <input
              type="email"
              id="signup-email"
              placeholder="Email"
              required
            />

            <input
              type="text"
              id="signup-username"
              placeholder="Username"
              required
            />

            <input
              type="password"
              id="signup-password"
              placeholder="Password"
              required
            />

            <input
              type="password"
              id="signup-confirm-password"
              placeholder="Confirm Password"
              required
            />

            <p id="signup-error" class="error"></p>

            <button type="submit">Sign Up</button>

            <p>
              Already have account?
              <button type="button" id="show-login">Login</button>
            </p>
          </form>
        </div>
      </section>


      <section id="login-page" class="section hidden">
        <div class="card auth-card">
          <h1>Login</h1>

          <form id="login-form">
            <input type="email" id="login-email" placeholder="Email" required />

            <input
              type="password"
              id="login-password"
              placeholder="Password"
              required
            />

            <p id="login-error" class="error"></p>

            <button type="submit">Login</button>

            <p>
              New user?

              <button type="button" id="show-signup">Create Account</button>
            </p>
          </form>
        </div>
      </section>

  

      <section id="dashboard" class="section hidden">
        <div class="card">
          <div class="header">
            <h1>Mini Bank</h1>

            <button id="logout-btn">Logout</button>
          </div>

          <h2>Account Details</h2>

          <p>
            Name:
            <span id="display-name"></span>
          </p>

          <p>
            Email:
            <span id="display-email"></span>
          </p>

          <p>
            Account ID:
            <span id="display-account-id"></span>
          </p>

          <h1 class="balance">₹ <span id="display-balance">0</span></h1>

          <div class="transaction-box">
            <h2>Deposit</h2>

            <input type="number" id="deposit-amount" placeholder="Amount" />

            <button id="deposit-btn">Deposit</button>

            <p id="deposit-error" class="error"></p>
          </div>

          <div class="transaction-box">
            <h2>Withdraw</h2>

            <input type="number" id="withdraw-amount" placeholder="Amount" />

            <button id="withdraw-btn">Withdraw</button>

            <p id="withdraw-error" class="error"></p>
          </div>

          <h2>Transaction Summary</h2>

          <p>
            Total Deposited: ₹ <span id="summary-total-deposited"> 0 </span>
          </p>

          <p>
            Total Withdrawn: ₹ <span id="summary-total-withdrawn"> 0 </span>
          </p>

          <h2>Transaction History</h2>

          <div id="transactions-list"></div>
        </div>
      </section>
    </div>

    <script src="js/account.js"></script>

    <script src="js/transaction.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/main.js"></script>
  </body>
</html>
