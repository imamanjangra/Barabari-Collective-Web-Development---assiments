<!DOCTYPE html>
<html>
<head>
    <title>Digital Clock</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="clock-container">

        <div id="time" class="time">
            12:31:07 PM
        </div>

        <div id="date" class="date">
            15/02/2026
        </div>

        <button id="toggleBtn">
            Switch to 24-hour format
        </button>

    </div>


    <script src="script.js"></script>

</body>
</html>
